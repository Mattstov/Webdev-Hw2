<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>Expense Tracker</h1>
  </header>

  <main>

    <!-- ADD EXPENSE FORM -->
    <section class="card" id="form-section">
      <h2>Add Expense</h2>
      <form id="expense-form" novalidate>
        <div class="form-row">
          <label for="description">Description</label>
          <input type="text" id="description" placeholder="e.g. Coffee" />
        </div>
        <div class="form-row">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" min="0.01" step="0.01" placeholder="0.00" />
        </div>
        <div class="form-row">
          <label for="category">Category</label>
          <select id="category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-row">
          <label for="date">Date</label>
          <input type="date" id="date" />
        </div>
        <p id="form-error" class="error-msg" aria-live="polite"></p>
        <button type="submit" class="btn btn-primary">Add Expense</button>
      </form>
    </section>

    <!-- TOTALS -->
    <section class="card" id="totals-section">
      <h2>Summary</h2>
      <div class="total-main">
        <span class="total-label">Total</span>
        <span id="total-all" class="total-amount">$0.00</span>
      </div>
      <div id="category-totals"></div>
      <p id="expense-count" class="count-label"></p>
    </section>

    <!-- CONTROLS: FILTER + SORT -->
    <section class="card" id="controls-section">
      <div class="controls-row">
        <div class="control-group">
          <label for="filter-category">Filter by category</label>
          <select id="filter-category">
            <option value="All">All</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="control-group">
          <label for="sort-by">Sort by</label>
          <select id="sort-by">
            <option value="date-desc">Date (newest)</option>
            <option value="date-asc">Date (oldest)</option>
            <option value="amount-desc">Amount (high → low)</option>
            <option value="amount-asc">Amount (low → high)</option>
          </select>
        </div>
      </div>
    </section>

    <!-- EXPENSE LIST -->
    <section class="card" id="list-section">
      <h2>Expenses</h2>
      <div id="expense-list"></div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
